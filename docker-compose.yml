services:
  # --- Django -------------------------------------------------
  django-web:
    build: .
    container_name: django-docker2
    restart: unless-stopped
    volumes:
      - ./static:/app/staticfiles
      - ./media:/app/media
      - ./db.sqlite3:/app/db.sqlite3
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    env_file:
      - .env.prod
    depends_on:
      - redis
    cap_add:
      - NET_RAW

  # --- Nginx reverso -----------------------------------------
  frontend-proxy:
    image: nginx:latest
    container_name: nginx-proxy2
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/static:ro
      - ./media:/media:ro
    depends_on:
      - django-web

  # --- Redis --------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always

  # --- Celery Worker -----------------------------------------
  celery-worker:
    build: .
    container_name: celery-worker
    command: celery -A pagosNew worker -l info
    restart: always
    depends_on:
      - redis
      - django-web
    env_file:
      - .env.prod
    volumes:
      - ./static:/app/staticfiles
      - ./media:/app/media
      - ./db.sqlite3:/app/db.sqlite3
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    cap_add:
      - NET_RAW

  # --- Celery Beat -------------------------------------------
  celery-beat:
    build: .
    container_name: celery-beat
    command: celery -A pagosNew beat -l info
    restart: always
    depends_on:
      - redis
      - django-web
    env_file:
      - .env.prod
    volumes:
      - ./static:/app/staticfiles
      - ./media:/app/media
      - ./db.sqlite3:/app/db.sqlite3
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    cap_add:
      - NET_RAW